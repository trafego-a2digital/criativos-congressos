name: Gerar criativos semanais

on:
  schedule:
    # toda segunda-feira as 08:00 (horario de Brasilia = UTC-3)
    - cron: "0 11 * * 1"
  workflow_dispatch: {}

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Gerar criativos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python scripts/main.py

      - name: Atualizar galeria (docs/index.html)
        run: python scripts/build_gallery.py

      - name: Atualizar galeria (docs/index.html)
        run: python scripts/build_gallery.py

      - name: Commit dos criativos gerados
        run: |
          git config user.name "creative-bot"
          git config user.email "creative-bot@users.noreply.github.com"
          git add docs/
          git commit -m "Criativos semanais $(date +'%Y-%m-%d')" || echo "nada novo para commitar"
          git push
